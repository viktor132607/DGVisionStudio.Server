name: Remaining service test audit

on:
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Find services without direct test classes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          roots = [Path('DGVisionStudio.Api'), Path('DGVisionStudio.Infrastructure')]
          tests_root = Path('DGVisionStudio.Tests')

          class_pattern = re.compile(r'\b(?:public|internal)\s+(?:sealed\s+|abstract\s+|partial\s+)*class\s+([A-Za-z_][A-Za-z0-9_]*)')
          test_classes = set()
          for path in tests_root.rglob('*.cs'):
              text = path.read_text(encoding='utf-8-sig', errors='ignore')
              test_classes.update(class_pattern.findall(text))

          services = []
          for root in roots:
              if not root.exists():
                  continue
              for path in root.rglob('*.cs'):
                  parts = {p.lower() for p in path.parts}
                  if 'migrations' in parts or 'obj' in parts or 'bin' in parts:
                      continue
                  text = path.read_text(encoding='utf-8-sig', errors='ignore')
                  for name in class_pattern.findall(text):
                      if not name.endswith('Service'):
                          continue
                      services.append((name, str(path)))

          dedup = {}
          for name, path in services:
              dedup.setdefault(name, path)

          missing = []
          covered = []
          for name, path in sorted(dedup.items()):
              expected = f'{name}Tests'
              if expected in test_classes:
                  covered.append((name, path, expected))
              else:
                  missing.append((name, path, expected))

          report = []
          report.append(f'TOTAL_CONCRETE_SERVICES={len(dedup)}')
          report.append(f'WITH_DIRECT_TEST_CLASS={len(covered)}')
          report.append(f'WITHOUT_DIRECT_TEST_CLASS={len(missing)}')
          report.append('')
          report.append('MISSING:')
          for name, path, expected in missing:
              report.append(f'{name}|{path}|{expected}')
          report.append('')
          report.append('COVERED:')
          for name, path, expected in covered:
              report.append(f'{name}|{path}|{expected}')

          Path('remaining-services-report.txt').write_text('\n'.join(report) + '\n', encoding='utf-8')
          print('\n'.join(report[:4] + [*(f'{n}|{p}|{e}' for n,p,e in missing)]))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: remaining-services-report
          path: remaining-services-report.txt
          if-no-files-found: error
