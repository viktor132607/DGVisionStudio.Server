name: Backend tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DGVisionStudio.Server.slnx

      - name: Build
        shell: bash
        run: |
          mkdir -p TestResults
          set -o pipefail
          dotnet build DGVisionStudio.Server.slnx --configuration Release --no-restore 2>&1 | tee TestResults/build.log

      - name: Test
        run: dotnet test DGVisionStudio.Server.slnx --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=backend-tests.trx" --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: TestResults
          if-no-files-found: ignore
