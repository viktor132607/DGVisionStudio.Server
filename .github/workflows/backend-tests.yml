name: Backend tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DGVisionStudio.Server.slnx

      - name: Build
        run: dotnet build DGVisionStudio.Server.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DGVisionStudio.Server.slnx --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --logger "trx;LogFileName=tests.trx" --results-directory TestResults

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: TestResults
          if-no-files-found: ignore
