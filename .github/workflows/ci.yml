name: Server CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Restore, build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Diagnose production slideshow endpoints
        shell: bash
        run: |
          set +e
          endpoints=(
            "portfolio/slideshow"
            "portfolio/slideshow/intro-video"
            "portfolio/slideshow/settings"
            "portfolio/images"
            "health"
          )

          for endpoint in "${endpoints[@]}"; do
            url="https://api.dgvisionstudio.com/api/${endpoint}"
            echo "========== ${url} =========="
            rm -f /tmp/headers.txt /tmp/body.txt
            curl --silent --show-error --location \
              --connect-timeout 10 \
              --max-time 30 \
              --dump-header /tmp/headers.txt \
              --output /tmp/body.txt \
              --write-out "curl_exit=%{exitcode} http=%{http_code} connect=%{time_connect}s starttransfer=%{time_starttransfer}s total=%{time_total}s size=%{size_download}\n" \
              "${url}"
            curl_status=$?
            echo "process_exit=${curl_status}"
            echo "--- headers ---"
            cat /tmp/headers.txt 2>/dev/null || true
            echo "--- body preview ---"
            head -c 3000 /tmp/body.txt 2>/dev/null || true
            echo
          done

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
