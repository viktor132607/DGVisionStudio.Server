name: Server CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Restore, build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        id: build
        shell: bash
        run: |
          set +e
          dotnet build --no-restore --configuration Release > build.log 2>&1
          status=$?
          tail -100 build.log > build-tail.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat build-tail.txt
          exit 0

      - name: Upload build diagnostics
        if: steps.build.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build-tail.txt

      - name: Fail failed build
        if: steps.build.outputs.status != '0'
        run: exit 1

      - name: Test
        if: steps.build.outputs.status == '0'
        run: dotnet test --no-build --configuration Release --verbosity normal
