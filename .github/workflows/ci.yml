name: Server CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Restore, build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        shell: bash
        run: |
          set +e
          output=$(dotnet build --no-restore --configuration Release 2>&1)
          status=$?
          printf '%s\n' "$output" | tail -80
          exit $status

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
